name: Feature request
description: Propose a bounded, user-visible capability.
title: "feature: "
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        This is a public issue. Do not include credentials, personal or customer data, private infrastructure, audit evidence, accepted risks, or vulnerability details. Read the [GitHub issue guidelines](https://docs.l-it.io/contributing/github-issues/).
  - type: textarea
    id: problem
    attributes:
      label: Problem or need
      description: Describe the user need and why the current behavior is insufficient.
    validations:
      required: true
  - type: textarea
    id: outcome
    attributes:
      label: Desired outcome
      description: Describe the observable result without prescribing unnecessary implementation details.
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      description: List measurable conditions that show the feature is complete.
      placeholder: |
        - [ ] The supported user can...
        - [ ] Verification demonstrates...
        - [ ] Public documentation is updated...
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Scope, dependencies, and context
      description: Identify the affected component, constraints, dependencies, exclusions, and public references.
    validations:
      required: false
  - type: textarea
    id: risk
    attributes:
      label: Security, privacy, and operational impact
      description: State public-safe impacts or write "No material impact identified" with a reason.
    validations:
      required: true
  - type: checkboxes
    id: safety
    attributes:
      label: Public-content confirmation
      options:
        - label: I confirm this issue contains no secrets, personal or customer data, private infrastructure, protected evidence, or undisclosed vulnerability information.
          required: true
