# yamllint disable rule:truthy
---
name: Reusable container Trivy scan

on:
  workflow_call:
    inputs:
      image_name:
        description: Local image name used for the scan build.
        required: false
        type: string
        default: local/container-trivy
      containerfile:
        description: Containerfile or Dockerfile path.
        required: false
        type: string
        default: Dockerfile
      context:
        description: Container build context.
        required: false
        type: string
        default: .
      build_args:
        description: Newline-delimited build arguments.
        required: false
        type: string
        default: ""
      severity:
        description: Severity gate for failing the scan.
        required: false
        type: string
        default: CRITICAL

permissions:
  contents: read

jobs:
  trivy:
    name: Trivy container scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7

      - name: Set up Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5  # v4

      - name: Build local image for Trivy
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf  # v7
        with:
          context: ${{ inputs.context }}
          file: ${{ inputs.containerfile }}
          push: false
          load: true
          platforms: linux/amd64
          tags: ${{ inputs.image_name }}:${{ github.sha }}
          build-args: ${{ inputs.build_args }}

      - name: Generate Trivy SARIF
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ inputs.image_name }}:${{ github.sha }}
          format: sarif
          output: trivy-results.sarif
          vuln-type: os,library
          ignore-unfixed: true
          severity: ${{ inputs.severity }}
          exit-code: "0"

      - name: Upload Trivy SARIF
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-results.sarif

      - name: Run Trivy vulnerability gate
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ inputs.image_name }}:${{ github.sha }}
          format: table
          vuln-type: os,library
          ignore-unfixed: true
          severity: ${{ inputs.severity }}
          exit-code: "1"
